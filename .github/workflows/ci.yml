name: CI

on:
  push:
    branches: [main, scratch]
  pull_request:
    branches: [main, scratch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Build (smoke test)
        run: go build -o cardbot .
